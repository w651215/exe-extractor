<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>EXE 解压工具</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
        .header { text-align: center; padding: 30px 0; }
        .header-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .badge {
            display: inline-block;
            background: #ecfdf5; color: #059669;
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500; margin-top: 12px;
        }
        .upload-area {
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-area.disabled { pointer-events: none; opacity: 0.7; }
        .upload-icon {
            width: 60px; height: 60px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .upload-hint { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
        #file-input { display: none; }
        .progress { display: none; margin-bottom: 20px; }
        .progress.show { display: block; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 8px; color: var(--text-muted); font-size: 14px; }
        .result { display: none; background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .result.show { display: block; }
        .result-header { padding: 16px; background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .result-header h2 { font-size: 16px; font-weight: 600; }
        .result-header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .file-list { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .file-item {
            display: flex; align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .file-item:active { background: var(--bg); }
        .file-item:last-child { border-bottom: none; }
        .file-icon { width: 40px; height: 40px; background: var(--bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 20px; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .arrow { color: var(--primary); font-size: 20px; }
        .download-all {
            display: block;
            width: calc(100% - 32px);
            margin: 16px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .download-all:active { transform: scale(0.98); }
        .download-all:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-box { display: none; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .error-box.show { display: block; }
        .error-title { color: var(--danger); font-weight: 600; margin-bottom: 8px; }
        .error-msg { color: #991b1b; font-size: 14px; white-space: pre-wrap; line-height: 1.5; }
        .info-box { margin-top: 30px; padding: 16px; background: var(--card); border-radius: 12px; }
        .info-box h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; }
        .tag.highlight { background: #ecfdf5; color: #059669; }
        .tag.warning { background: #fef3c7; color: #92400e; }
        .footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 12px; }
        /* 密码弹窗 */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-bg.show { display: flex; }
        .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 340px; overflow: hidden; }
        .modal-header { padding: 24px 24px 0; text-align: center; }
        .modal-icon { font-size: 48px; margin-bottom: 12px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: var(--text-muted); }
        .modal-body { padding: 20px 24px; }
        .modal input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; }
        .modal input:focus { border-color: var(--primary); }
        .modal-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
        .modal-error.show { display: block; }
        .modal-btns { display: flex; gap: 12px; padding: 0 24px 24px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.cancel { background: var(--bg); color: var(--text); }
        .modal-btn.ok { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; }
        /* 格式检测显示 */
        .format-box { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .format-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .format-row:last-child { border-bottom: none; }
        .format-label { color: var(--text-muted); font-size: 13px; }
        .format-value { font-weight: 600; font-size: 14px; }
        .format-value.success { color: var(--success); }
        .format-value.warning { color: var(--warning); }
        .format-value.error { color: var(--danger); }
        /* 详细信息 */
        .detail-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 16px; margin-bottom: 20px; font-size: 12px; }
        .detail-title { font-weight: 600; color: #0369a1; margin-bottom: 8px; }
        .detail-content { color: #0c4a6e; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📦</div>
            <h1>EXE 解压工具</h1>
            <p>在浏览器本地解压自解压 EXE 文件</p>
            <span class="badge">🔒 本地处理，隐私安全</span>
        </div>
        
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📁</div>
            <div class="upload-title">点击选择文件</div>
            <div class="upload-hint">支持 ZIP 自解压 EXE、标准 ZIP<br>支持传统加密</div>
            <input type="file" id="fileInput" accept=".exe,.zip">
        </div>
        
        <div class="format-box" id="formatBox" style="display:none;">
            <div class="format-row">
                <span class="format-label">格式</span>
                <span class="format-value" id="fmtType">-</span>
            </div>
            <div class="format-row">
                <span class="format-label">数据偏移</span>
                <span class="format-value" id="fmtOffset">-</span>
            </div>
            <div class="format-row">
                <span class="format-label">加密</span>
                <span class="format-value" id="fmtEncrypted">-</span>
            </div>
            <div class="format-row">
                <span class="format-label">压缩方法</span>
                <span class="format-value" id="fmtCompress">-</span>
            </div>
        </div>
        
        <div class="detail-box" id="detailBox" style="display:none;">
            <div class="detail-title">📋 详细信息</div>
            <div class="detail-content" id="detailContent"></div>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">读取中...</div>
        </div>
        
        <div class="error-box" id="errorBox">
            <div class="error-title" id="errorTitle">❌ 解压失败</div>
            <div class="error-msg" id="errorMsg"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-header">
                <h2>✅ 解压成功</h2>
                <p id="resultInfo"></p>
            </div>
            <div class="file-list" id="fileList"></div>
            <button class="download-all" id="downloadAll">📥 打包下载全部</button>
        </div>
        
        <div class="info-box">
            <h3>支持的格式</h3>
            <div class="tags">
                <span class="tag highlight">ZIP 自解压</span>
                <span class="tag highlight">传统加密 ZIP</span>
            </div>
        </div>
        
        <div class="footer">
            <p>纯前端实现 · 无需服务器</p>
        </div>
    </div>
    
    <!-- 密码弹窗 -->
    <div class="modal-bg" id="pwdModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">🔐</div>
                <div class="modal-title">需要密码</div>
                <div class="modal-desc">该压缩包已加密，请输入密码</div>
            </div>
            <div class="modal-body">
                <input type="password" id="pwdInput" placeholder="请输入密码" autocomplete="off">
                <div class="modal-error" id="pwdError">密码错误，请重试</div>
            </div>
            <div class="modal-btns">
                <button class="modal-btn cancel" id="pwdCancel">取消</button>
                <button class="modal-btn ok" id="pwdOk">确认</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
    (function() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorBox = document.getElementById('errorBox');
        const errorTitle = document.getElementById('errorTitle');
        const errorMsg = document.getElementById('errorMsg');
        const result = document.getElementById('result');
        const resultInfo = document.getElementById('resultInfo');
        const fileList = document.getElementById('fileList');
        const downloadAll = document.getElementById('downloadAll');
        const formatBox = document.getElementById('formatBox');
        const fmtType = document.getElementById('fmtType');
        const fmtOffset = document.getElementById('fmtOffset');
        const fmtEncrypted = document.getElementById('fmtEncrypted');
        const fmtCompress = document.getElementById('fmtCompress');
        const detailBox = document.getElementById('detailBox');
        const detailContent = document.getElementById('detailContent');
        const pwdModal = document.getElementById('pwdModal');
        const pwdInput = document.getElementById('pwdInput');
        const pwdError = document.getElementById('pwdError');
        const pwdCancel = document.getElementById('pwdCancel');
        const pwdOk = document.getElementById('pwdOk');
        
        let files = [];
        let currentZipData = null;
        let pwdResolve = null;
        let logLines = [];
        
        function log(msg) {
            console.log(msg);
            logLines.push(msg);
        }
        
        function showLog() {
            detailContent.textContent = logLines.join('\n');
            detailBox.style.display = 'block';
        }
        
        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            return (b/1024/1024).toFixed(1) + ' MB';
        }
        
        function setProgress(pct, txt) {
            progressFill.style.width = pct + '%';
            progressText.textContent = txt;
        }
        
        function showError(title, msg) {
            errorTitle.textContent = title;
            errorMsg.textContent = msg;
            errorBox.classList.add('show');
            progress.classList.remove('show');
            dropZone.classList.remove('disabled');
            showLog();
        }
        
        function hideAll() {
            errorBox.classList.remove('show');
            result.classList.remove('show');
            progress.classList.remove('show');
            logLines = [];
        }
        
        // 压缩方法名称
        function getCompressName(method) {
            const names = {
                0: '存储(无压缩)',
                1: 'Shrink',
                2: 'Reduce-1',
                3: 'Reduce-2',
                4: 'Reduce-3',
                5: 'Reduce-4',
                6: 'Implode',
                7: ' tokenize',
                8: 'DEFLATE',
                9: 'DEFLATE64',
                10: 'Implode(旧)',
                12: 'BZIP2',
                14: 'LZMA',
                18: 'Teresa',
                97: 'WavPack',
                98: 'PPMd',
                99: 'WinZip AES',
            };
            return names[method] || '未知(' + method + ')';
        }
        
        // 查找 ZIP 签名
        function findZipStart(data) {
            const limit = Math.min(data.length, 100 * 1024 * 1024);
            for (let i = 0; i < limit - 3; i++) {
                if (data[i] === 0x50 && data[i+1] === 0x4B && data[i+2] === 0x03 && data[i+3] === 0x04) {
                    return i;
                }
            }
            return -1;
        }
        
        // 解析 ZIP 本地文件头（第一个文件）
        function parseZipLocalHeader(data) {
            if (data.length < 30) return null;
            
            log('=== ZIP 本地文件头解析 ===');
            log('前30字节: ' + Array.from(data.slice(0, 30)).map(b => b.toString(16).padStart(2,'0')).join(' '));
            
            const view = new DataView(data.buffer, data.byteOffset);
            
            // 签名 0-3
            const sig = data[0] + (data[1] << 8) + (data[2] << 16) + (data[3] << 24);
            log('签名: 0x' + sig.toString(16) + ' (应为 0x04034b50)');
            
            // 版本 4-5
            const version = view.getUint16(4, true);
            log('解压版本: ' + version);
            
            // 标志位 6-7
            const flags = view.getUint16(6, true);
            log('标志位: ' + flags + ' (二进制: ' + flags.toString(2) + ')');
            
            // 压缩方法 8-9
            const compressMethod = view.getUint16(8, true);
            log('压缩方法: ' + compressMethod + ' = ' + getCompressName(compressMethod));
            
            // 时间 10-11, 日期 12-13
            const modTime = view.getUint16(10, true);
            const modDate = view.getUint16(12, true);
            log('修改时间: ' + modTime + ', 日期: ' + modDate);
            
            // CRC32 14-17
            const crc32 = view.getUint32(14, true);
            log('CRC32: 0x' + crc32.toString(16));
            
            // 压缩大小 18-21
            const compressedSize = view.getUint32(18, true);
            log('压缩大小: ' + compressedSize + ' 字节');
            
            // 原始大小 22-25
            const uncompressedSize = view.getUint32(22, true);
            log('原始大小: ' + uncompressedSize + ' 字节');
            
            // 文件名长度 26-27
            const nameLen = view.getUint16(26, true);
            log('文件名长度: ' + nameLen);
            
            // 扩展字段长度 28-29
            const extraLen = view.getUint16(28, true);
            log('扩展字段长度: ' + extraLen);
            
            // 文件名
            const fileName = new TextDecoder().decode(data.slice(30, 30 + nameLen));
            log('文件名: "' + fileName + '"');
            
            // 加密标志
            const encrypted = (flags & 0x1) === 1;
            log('加密: ' + (encrypted ? '是' : '否'));
            
            return {
                flags,
                compressMethod,
                encrypted,
                compressName: getCompressName(compressMethod),
                compressedSize,
                uncompressedSize,
                fileName,
                nameLen,
                extraLen
            };
        }
        
        // 显示格式信息
        function showFormat(type, offset, header) {
            fmtType.textContent = type;
            fmtType.className = 'format-value success';
            fmtOffset.textContent = offset > 0 ? offset + ' 字节' : '标准格式';
            fmtEncrypted.textContent = header.encrypted ? '是 (传统加密)' : '否';
            fmtEncrypted.className = 'format-value ' + (header.encrypted ? 'warning' : 'success');
            fmtCompress.textContent = header.compressName;
            fmtCompress.className = 'format-value ' + (header.compressMethod > 20 && header.compressMethod !== 99 ? 'error' : (header.compressMethod === 99 ? 'error' : 'success'));
            formatBox.style.display = 'block';
        }
        
        // 密码弹窗
        function askPassword(isRetry = false) {
            return new Promise(resolve => {
                pwdResolve = resolve;
                pwdInput.value = '';
                pwdError.classList.toggle('show', isRetry);
                pwdModal.classList.add('show');
                setTimeout(() => pwdInput.focus(), 100);
            });
        }
        
        function closePwdModal(value) {
            pwdModal.classList.remove('show');
            if (pwdResolve) {
                pwdResolve(value);
                pwdResolve = null;
            }
        }
        
        pwdOk.onclick = () => closePwdModal(pwdInput.value);
        pwdCancel.onclick = () => closePwdModal(null);
        pwdInput.onkeypress = (e) => { if (e.key === 'Enter') pwdOk.click(); };
        
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = ''; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = () => { if (fileInput.files[0]) processFile(fileInput.files[0]); };
        
        async function processFile(file) {
            hideAll();
            formatBox.style.display = 'none';
            detailBox.style.display = 'none';
            progress.classList.add('show');
            dropZone.classList.add('disabled');
            files = [];
            
            try {
                log('文件名: ' + file.name);
                log('文件大小: ' + formatSize(file.size));
                
                setProgress(10, '读取文件...');
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                log('读取完成: ' + data.length + ' 字节');
                
                setProgress(20, '检测格式...');
                const zipStart = findZipStart(data);
                
                if (zipStart === -1) {
                    log('未找到 ZIP 签名');
                    showError('❌ 格式不支持', '无法识别为 ZIP 文件');
                    return;
                }
                
                log('ZIP 签名位置: ' + zipStart);
                currentZipData = data.slice(zipStart);
                log('ZIP 数据大小: ' + currentZipData.length + ' 字节');
                
                const header = parseZipLocalHeader(currentZipData);
                
                if (!header) {
                    showError('❌ 解析失败', '无法解析 ZIP 文件头');
                    return;
                }
                
                showFormat('ZIP', zipStart, header);
                
                // 检查压缩方法
                if (header.compressMethod !== 0 && header.compressMethod !== 8 && header.compressMethod < 100) {
                    log('警告: 压缩方法 ' + header.compressMethod + ' 可能不被支持');
                }
                
                let password = null;
                if (header.encrypted) {
                    password = await askPassword(false);
                    if (!password) {
                        progress.classList.remove('show');
                        dropZone.classList.remove('disabled');
                        return;
                    }
                    log('用户输入密码: ' + password.length + ' 字符');
                }
                
                await extractZip(currentZipData, password);
                
            } catch (err) {
                log('错误: ' + err.message);
                showError('❌ 解压失败', err.message || '未知错误');
            } finally {
                dropZone.classList.remove('disabled');
                if (!pwdModal.classList.contains('show')) {
                    progress.classList.remove('show');
                }
            }
        }
        
        async function extractZip(zipData, password) {
            setProgress(40, '解压中...');
            
            log('=== 尝试解压 ===');
            
            // 方法1: fflate
            log('尝试 fflate...');
            let result = extractWithFflate(zipData, password);
            log('fflate 结果: success=' + result.success + ', files=' + result.files.length + ', error=' + result.error);
            
            if (result.success && result.files.length > 0) {
                files = result.files;
                logFiles();
                showResult();
                return;
            }
            
            // 方法2: JSZip
            log('尝试 JSZip...');
            result = await extractWithJSZip(zipData, password);
            log('JSZip 结果: success=' + result.success + ', files=' + result.files.length + ', error=' + result.error);
            
            if (result.success && result.files.length > 0) {
                files = result.files;
                logFiles();
                showResult();
                return;
            }
            
            // 需要密码？
            if (result.needPassword) {
                if (!password) {
                    const newPwd = await askPassword(false);
                    if (newPwd) {
                        return await extractZip(zipData, newPwd);
                    }
                } else {
                    const newPwd = await askPassword(true);
                    if (newPwd) {
                        return await extractZip(zipData, newPwd);
                    }
                }
                return;
            }
            
            if (result.files.length === 0) {
                showError('⚠️ 空文件', '解压成功但没有找到文件');
            } else {
                showError('❌ 解压失败', result.error || '未知错误');
            }
        }
        
        function logFiles() {
            log('=== 解压出的文件 ===');
            files.forEach((f, i) => {
                log(i + 1 + '. ' + f.name + ' (' + formatSize(f.size) + ')');
            });
        }
        
        function extractWithFflate(zipData, password) {
            try {
                const opts = password ? { password } : {};
                const unzipped = fflate.unzipSync(zipData, opts);
                
                log('fflate 返回的键: ' + Object.keys(unzipped).join(', '));
                
                const files = [];
                for (const [path, data] of Object.entries(unzipped)) {
                    log('  处理: ' + path + ', 大小=' + data.length);
                    if (!path.endsWith('/')) {
                        files.push({ name: path.split('/').pop(), path, size: data.length, data });
                    }
                }
                
                return { success: true, files };
            } catch (e) {
                const msg = (e.message || '').toLowerCase();
                log('fflate 错误: ' + e.message);
                const needPassword = msg.includes('password') || msg.includes('decrypt') || msg.includes('encrypted');
                return { success: false, error: e.message, needPassword, files: [] };
            }
        }
        
        async function extractWithJSZip(zipData, password) {
            try {
                const opts = password ? { password } : {};
                const zip = await JSZip.loadAsync(zipData, opts);
                
                const entries = Object.keys(zip.files);
                log('JSZip 条目: ' + entries.join(', '));
                
                const files = [];
                for (const [name, entry] of Object.entries(zip.files)) {
                    log('  处理: ' + name + ', dir=' + entry.dir);
                    if (entry.dir) continue;
                    try {
                        const data = await entry.async('uint8array');
                        log('    成功读取: ' + data.length + ' 字节');
                        files.push({ name: name.split('/').pop(), path: name, size: data.length, data });
                    } catch (e) {
                        log('    读取失败: ' + e.message);
                        const msg = (e.message || '').toLowerCase();
                        if (msg.includes('password') || msg.includes('encrypt')) {
                            return { success: false, needPassword: true, files: [] };
                        }
                    }
                }
                
                return { success: true, files };
            } catch (e) {
                log('JSZip 错误: ' + e.message);
                const msg = (e.message || '').toLowerCase();
                return { success: false, error: e.message, needPassword: msg.includes('password'), files: [] };
            }
        }
        
        function showResult() {
            const total = files.reduce((s, f) => s + f.size, 0);
            resultInfo.textContent = `${files.length} 个文件，共 ${formatSize(total)}`;
            
            fileList.innerHTML = files.map((f, i) => `
                <div class="file-item" data-idx="${i}">
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                    </div>
                    <span class="arrow">›</span>
                </div>
            `).join('');
            
            fileList.querySelectorAll('.file-item').forEach(item => {
                item.onclick = () => downloadFile(files[+item.dataset.idx]);
            });
            
            progress.classList.remove('show');
            showLog();
            result.classList.add('show');
        }
        
        function downloadFile(f) {
            const blob = new Blob([f.data]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = f.name;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        downloadAll.onclick = async () => {
            downloadAll.disabled = true;
            downloadAll.textContent = '⏳ 打包中...';
            try {
                const zip = new JSZip();
                files.forEach(f => zip.file(f.path, f.data));
                const blob = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'extracted.zip';
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert('打包失败');
            }
            downloadAll.disabled = false;
            downloadAll.textContent = '📥 打包下载全部';
        };
    })();
    </script>
</body>
</html>
