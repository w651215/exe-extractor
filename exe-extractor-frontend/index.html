<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>EXE 解压工具</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
        .header { text-align: center; padding: 30px 0; }
        .header-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .badge {
            display: inline-block;
            background: #ecfdf5; color: #059669;
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500; margin-top: 12px;
        }
        .upload-area {
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-area.disabled { pointer-events: none; }
        .upload-icon {
            width: 60px; height: 60px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .upload-hint { color: var(--text-muted); font-size: 13px; }
        #file-input { display: none; }
        .progress { display: none; margin-bottom: 20px; }
        .progress.show { display: block; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 8px; color: var(--text-muted); font-size: 14px; }
        .result { display: none; background: var(--card); border-radius: 16px; overflow: hidden; }
        .result.show { display: block; }
        .result-header { padding: 16px; background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .result-header h2 { font-size: 16px; font-weight: 600; }
        .file-list { max-height: 400px; overflow-y: auto; }
        .file-item {
            display: flex; align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .file-item:active { background: var(--bg); }
        .file-icon { width: 36px; height: 36px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 12px; color: var(--text-muted); }
        .arrow { color: var(--primary); font-size: 18px; }
        .download-all {
            display: block;
            width: calc(100% - 32px);
            margin: 16px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .download-all:disabled { opacity: 0.5; }
        .error-box { display: none; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .error-box.show { display: block; }
        .error-title { color: var(--danger); font-weight: 600; margin-bottom: 4px; }
        .error-msg { color: #991b1b; font-size: 14px; white-space: pre-wrap; }
        .info-box { margin-top: 30px; padding: 16px; background: var(--card); border-radius: 12px; }
        .info-box h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; }
        .footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 12px; }
        /* 密码弹窗 */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-bg.show { display: flex; }
        .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 340px; padding: 24px; }
        .modal-title { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 16px; }
        .modal input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
        .modal .error { color: var(--danger); font-size: 13px; margin-bottom: 12px; display: none; }
        .modal .error.show { display: block; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .modal-btn.cancel { background: var(--bg); border: none; }
        .modal-btn.ok { background: var(--primary); color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📦</div>
            <h1>EXE 解压工具</h1>
            <p>在浏览器本地解压自解压 EXE 文件</p>
            <span class="badge">🔒 本地处理，隐私安全</span>
        </div>
        
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📁</div>
            <div class="upload-title">点击选择文件</div>
            <div class="upload-hint">支持 ZIP 自解压 EXE、标准 ZIP</div>
            <input type="file" id="fileInput" accept=".exe,.zip">
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">读取中...</div>
        </div>
        
        <div class="error-box" id="errorBox">
            <div class="error-title">❌ 解压失败</div>
            <div class="error-msg" id="errorMsg"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-header">
                <h2>✅ 解压成功</h2>
                <p id="resultInfo"></p>
            </div>
            <div class="file-list" id="fileList"></div>
            <button class="download-all" id="downloadAll">📥 打包下载全部</button>
        </div>
        
        <div class="info-box">
            <h3>支持的格式</h3>
            <div class="tags">
                <span class="tag">ZIP 自解压 EXE</span>
                <span class="tag">标准 ZIP</span>
                <span class="tag">加密 ZIP</span>
            </div>
        </div>
        
        <div class="footer">
            <p>纯前端实现 · 无需服务器</p>
        </div>
    </div>
    
    <!-- 密码弹窗 -->
    <div class="modal-bg" id="pwdModal">
        <div class="modal">
            <div class="modal-title">🔐 需要密码</div>
            <div class="modal-desc">该压缩包已加密</div>
            <input type="password" id="pwdInput" placeholder="请输入密码">
            <div class="error" id="pwdError">密码错误</div>
            <div class="modal-btns">
                <button class="modal-btn cancel" id="pwdCancel">取消</button>
                <button class="modal-btn ok" id="pwdOk">确认</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
    (function() {
        // 元素
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');
        const result = document.getElementById('result');
        const resultInfo = document.getElementById('resultInfo');
        const fileList = document.getElementById('fileList');
        const downloadAll = document.getElementById('downloadAll');
        const pwdModal = document.getElementById('pwdModal');
        const pwdInput = document.getElementById('pwdInput');
        const pwdError = document.getElementById('pwdError');
        const pwdCancel = document.getElementById('pwdCancel');
        const pwdOk = document.getElementById('pwdOk');
        
        let files = [];
        let currentData = null;
        let pwdResolve = null;
        
        // 工具函数
        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            return (b/1024/1024).toFixed(1) + ' MB';
        }
        
        function setProgress(pct, txt) {
            progressFill.style.width = pct + '%';
            progressText.textContent = txt;
        }
        
        function showError(msg) {
            errorMsg.textContent = msg;
            errorBox.classList.add('show');
            progress.classList.remove('show');
            dropZone.classList.remove('disabled');
        }
        
        function hideAll() {
            errorBox.classList.remove('show');
            result.classList.remove('show');
            progress.classList.remove('show');
        }
        
        // 查找 ZIP 签名
        function findZipStart(data) {
            // ZIP 本地文件头签名: 50 4B 03 04
            for (let i = 0; i < Math.min(data.length - 3, 50000000); i++) {
                if (data[i] === 0x50 && data[i+1] === 0x4B && data[i+2] === 0x03 && data[i+3] === 0x04) {
                    return i;
                }
            }
            return -1;
        }
        
        // 密码弹窗
        function askPassword() {
            return new Promise(resolve => {
                pwdResolve = resolve;
                pwdInput.value = '';
                pwdError.classList.remove('show');
                pwdModal.classList.add('show');
                setTimeout(() => pwdInput.focus(), 100);
            });
        }
        
        pwdOk.onclick = () => {
            pwdModal.classList.remove('show');
            if (pwdResolve) pwdResolve(pwdInput.value);
        };
        
        pwdCancel.onclick = () => {
            pwdModal.classList.remove('show');
            if (pwdResolve) pwdResolve(null);
        };
        
        pwdInput.onkeypress = (e) => {
            if (e.key === 'Enter') pwdOk.click();
        };
        
        // 文件选择
        dropZone.onclick = () => fileInput.click();
        
        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
        };
        
        dropZone.ondragleave = () => {
            dropZone.style.borderColor = '';
        };
        
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            if (e.dataTransfer.files[0]) {
                processFile(e.dataTransfer.files[0]);
            }
        };
        
        fileInput.onchange = () => {
            if (fileInput.files[0]) {
                processFile(fileInput.files[0]);
            }
        };
        
        // 主处理函数
        async function processFile(file) {
            hideAll();
            progress.classList.add('show');
            dropZone.classList.add('disabled');
            files = [];
            
            try {
                setProgress(10, '读取文件...');
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                
                setProgress(20, '检测格式...');
                const zipStart = findZipStart(data);
                
                if (zipStart === -1) {
                    throw new Error('不是有效的 ZIP 文件。\n\n支持的格式：ZIP、ZIP自解压EXE');
                }
                
                console.log('ZIP起始位置:', zipStart);
                
                // 提取 ZIP 数据
                currentData = data.slice(zipStart);
                
                // 解压
                await extractZip(currentData, null);
                
            } catch (err) {
                if (err.message !== 'CANCEL') {
                    showError(err.message);
                }
            } finally {
                dropZone.classList.remove('disabled');
                if (!pwdModal.classList.contains('show')) {
                    progress.classList.remove('show');
                }
            }
        }
        
        // 解压 ZIP
        async function extractZip(zipData, password) {
            setProgress(40, '解压中...');
            
            try {
                // 加载 ZIP
                const options = {};
                if (password) options.password = password;
                
                const zip = await JSZip.loadAsync(zipData, options);
                const entries = Object.keys(zip.files);
                const result = [];
                
                for (let i = 0; i < entries.length; i++) {
                    const name = entries[i];
                    const entry = zip.files[name];
                    
                    if (entry.dir) continue;
                    
                    setProgress(40 + (i / entries.length) * 50, '解压: ' + name);
                    
                    try {
                        const content = await entry.async('uint8array');
                        result.push({
                            name: name.split('/').pop(),
                            path: name,
                            size: content.length,
                            data: content
                        });
                    } catch (e) {
                        // 如果出错，可能是需要密码
                        const msg = (e.message || '').toLowerCase();
                        console.log('解压文件出错:', name, msg);
                        
                        if (!password && (msg.includes('password') || msg.includes('encrypt') || msg.includes('compression'))) {
                            // 需要密码
                            const newPwd = await askPassword();
                            if (!newPwd) throw new Error('CANCEL');
                            // 重新解压
                            return await extractZip(zipData, newPwd);
                        } else if (password) {
                            // 密码错误
                            pwdError.classList.add('show');
                            const newPwd = await askPassword();
                            if (!newPwd) throw new Error('CANCEL');
                            return await extractZip(zipData, newPwd);
                        }
                        throw e;
                    }
                }
                
                if (result.length === 0) {
                    throw new Error('压缩包中没有文件');
                }
                
                files = result;
                showResult();
                
            } catch (e) {
                if (e.message !== 'CANCEL') {
                    // 检查是否需要密码
                    const msg = (e.message || '').toLowerCase();
                    if (!password && (msg.includes('corrupt') || msg.includes('encrypted') || msg.includes('password'))) {
                        const newPwd = await askPassword();
                        if (newPwd) {
                            return await extractZip(zipData, newPwd);
                        }
                        throw new Error('CANCEL');
                    }
                    throw e;
                }
                throw e;
            }
        }
        
        // 显示结果
        function showResult() {
            const total = files.reduce((s, f) => s + f.size, 0);
            resultInfo.textContent = `${files.length} 个文件，共 ${formatSize(total)}`;
            
            fileList.innerHTML = files.map((f, i) => `
                <div class="file-item" data-idx="${i}">
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                    </div>
                    <span class="arrow">›</span>
                </div>
            `).join('');
            
            fileList.querySelectorAll('.file-item').forEach(item => {
                item.onclick = () => {
                    const f = files[+item.dataset.idx];
                    downloadFile(f);
                };
            });
            
            progress.classList.remove('show');
            result.classList.add('show');
        }
        
        // 下载单个文件
        function downloadFile(f) {
            const blob = new Blob([f.data]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = f.name;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        // 打包下载
        downloadAll.onclick = async () => {
            downloadAll.disabled = true;
            downloadAll.textContent = '打包中...';
            
            try {
                const zip = new JSZip();
                files.forEach(f => zip.file(f.path, f.data));
                const blob = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'extracted.zip';
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert('打包失败: ' + e.message);
            }
            
            downloadAll.disabled = false;
            downloadAll.textContent = '📥 打包下载全部';
        };
    })();
    </script>
</body>
</html>
