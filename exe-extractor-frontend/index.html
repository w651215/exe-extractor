<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>EXE 解压工具</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
        .header { text-align: center; padding: 30px 0; }
        .header-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 40px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }
        .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .badge {
            display: inline-block;
            background: #ecfdf5; color: #059669;
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500; margin-top: 12px;
        }
        .upload-area {
            background: var(--card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); }
        .upload-area.disabled { pointer-events: none; opacity: 0.7; }
        .upload-icon {
            width: 60px; height: 60px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }
        .upload-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .upload-hint { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
        #file-input { display: none; }
        .progress { display: none; margin-bottom: 20px; }
        .progress.show { display: block; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 8px; color: var(--text-muted); font-size: 14px; }
        .result { display: none; background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .result.show { display: block; }
        .result-header { padding: 16px; background: linear-gradient(135deg, var(--success), #059669); color: white; }
        .result-header h2 { font-size: 16px; font-weight: 600; }
        .result-header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .file-list { max-height: 400px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .file-item {
            display: flex; align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .file-item:active { background: var(--bg); }
        .file-item:last-child { border-bottom: none; }
        .file-icon { width: 40px; height: 40px; background: var(--bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 20px; }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .arrow { color: var(--primary); font-size: 20px; }
        .download-all {
            display: block;
            width: calc(100% - 32px);
            margin: 16px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .download-all:active { transform: scale(0.98); }
        .download-all:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-box { display: none; background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .error-box.show { display: block; }
        .error-title { color: var(--danger); font-weight: 600; margin-bottom: 4px; }
        .error-msg { color: #991b1b; font-size: 14px; white-space: pre-wrap; }
        .info-box { margin-top: 30px; padding: 16px; background: var(--card); border-radius: 12px; }
        .info-box h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { padding: 6px 12px; background: var(--bg); border-radius: 6px; font-size: 13px; }
        .tag.highlight { background: #ecfdf5; color: #059669; }
        .tag.partial { background: #fef3c7; color: #92400e; }
        .tag.unsupported { background: #fef2f2; color: #991b1b; }
        .footer { text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 12px; }
        /* 密码弹窗 */
        .modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-bg.show { display: flex; }
        .modal { background: var(--card); border-radius: 16px; width: 100%; max-width: 340px; overflow: hidden; }
        .modal-header { padding: 24px 24px 0; text-align: center; }
        .modal-icon { font-size: 48px; margin-bottom: 12px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: var(--text-muted); }
        .modal-body { padding: 20px 24px; }
        .modal input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; }
        .modal input:focus { border-color: var(--primary); }
        .modal-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
        .modal-error.show { display: block; }
        .modal-btns { display: flex; gap: 12px; padding: 0 24px 24px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
        .modal-btn.cancel { background: var(--bg); color: var(--text); }
        .modal-btn.ok { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; }
        /* 格式检测显示 */
        .format-detected { display: none; background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
        .format-detected.show { display: block; }
        .format-name { font-size: 24px; font-weight: 700; color: var(--primary); }
        .format-offset { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">📦</div>
            <h1>EXE 解压工具</h1>
            <p>在浏览器本地解压自解压 EXE 文件</p>
            <span class="badge">🔒 本地处理，隐私安全</span>
        </div>
        
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">📁</div>
            <div class="upload-title">点击选择文件</div>
            <div class="upload-hint">支持 ZIP、7z 自解压 EXE<br>自动检测格式</div>
            <input type="file" id="fileInput" accept=".exe,.zip,.7z">
        </div>
        
        <div class="format-detected" id="formatBox">
            <div>检测到格式</div>
            <div class="format-name" id="formatName">-</div>
            <div class="format-offset" id="formatOffset">-</div>
        </div>
        
        <div class="progress" id="progress">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">读取中...</div>
        </div>
        
        <div class="error-box" id="errorBox">
            <div class="error-title">❌ 解压失败</div>
            <div class="error-msg" id="errorMsg"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-header">
                <h2>✅ 解压成功</h2>
                <p id="resultInfo"></p>
            </div>
            <div class="file-list" id="fileList"></div>
            <button class="download-all" id="downloadAll">📥 打包下载全部</button>
        </div>
        
        <div class="info-box">
            <h3>支持的格式</h3>
            <div class="tags">
                <span class="tag highlight">ZIP 自解压</span>
                <span class="tag highlight">加密 ZIP</span>
                <span class="tag partial">7z 自解压 (有限支持)</span>
                <span class="tag unsupported">RAR 不支持</span>
            </div>
        </div>
        
        <div class="footer">
            <p>纯前端实现 · 无需服务器</p>
        </div>
    </div>
    
    <!-- 密码弹窗 -->
    <div class="modal-bg" id="pwdModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">🔐</div>
                <div class="modal-title">需要密码</div>
                <div class="modal-desc">该压缩包已加密</div>
            </div>
            <div class="modal-body">
                <input type="password" id="pwdInput" placeholder="请输入密码" autocomplete="off">
                <div class="modal-error" id="pwdError">密码错误</div>
            </div>
            <div class="modal-btns">
                <button class="modal-btn cancel" id="pwdCancel">取消</button>
                <button class="modal-btn ok" id="pwdOk">确认</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
    (function() {
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const errorBox = document.getElementById('errorBox');
        const errorMsg = document.getElementById('errorMsg');
        const result = document.getElementById('result');
        const resultInfo = document.getElementById('resultInfo');
        const fileList = document.getElementById('fileList');
        const downloadAll = document.getElementById('downloadAll');
        const formatBox = document.getElementById('formatBox');
        const formatName = document.getElementById('formatName');
        const formatOffset = document.getElementById('formatOffset');
        const pwdModal = document.getElementById('pwdModal');
        const pwdInput = document.getElementById('pwdInput');
        const pwdError = document.getElementById('pwdError');
        const pwdCancel = document.getElementById('pwdCancel');
        const pwdOk = document.getElementById('pwdOk');
        
        let files = [];
        let currentZipData = null;
        let currentFormat = null;
        let pwdResolve = null;
        
        function formatSize(b) {
            if (b < 1024) return b + ' B';
            if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
            return (b/1024/1024).toFixed(1) + ' MB';
        }
        
        function setProgress(pct, txt) {
            progressFill.style.width = pct + '%';
            progressText.textContent = txt;
        }
        
        function showError(msg) {
            errorMsg.textContent = msg;
            errorBox.classList.add('show');
            progress.classList.remove('show');
            formatBox.classList.remove('show');
            dropZone.classList.remove('disabled');
        }
        
        function hideAll() {
            errorBox.classList.remove('show');
            result.classList.remove('show');
            progress.classList.remove('show');
            formatBox.classList.remove('show');
        }
        
        function showFormat(name, offset) {
            formatName.textContent = name;
            formatOffset.textContent = offset > 0 ? `数据偏移: ${offset} 字节` : '标准格式';
            formatBox.classList.add('show');
        }
        
        // 检测压缩格式
        function detectFormat(data) {
            // 搜索范围：前 100MB
            const searchLimit = Math.min(data.length, 100 * 1024 * 1024);
            
            // ZIP 签名: PK\x03\x04
            for (let i = 0; i < searchLimit - 3; i++) {
                if (data[i] === 0x50 && data[i+1] === 0x4B && data[i+2] === 0x03 && data[i+3] === 0x04) {
                    return { type: 'ZIP', offset: i };
                }
            }
            
            // 7z 签名: 7z\xBC\xAF\x27\x1C
            for (let i = 0; i < searchLimit - 5; i++) {
                if (data[i] === 0x37 && data[i+1] === 0x7A && data[i+2] === 0xBC && 
                    data[i+3] === 0xAF && data[i+4] === 0x27 && data[i+5] === 0x1C) {
                    return { type: '7Z', offset: i };
                }
            }
            
            // RAR 签名: Rar!\x1A\x07
            for (let i = 0; i < searchLimit - 5; i++) {
                if (data[i] === 0x52 && data[i+1] === 0x61 && data[i+2] === 0x72 && 
                    data[i+3] === 0x21 && data[i+4] === 0x1A && data[i+5] === 0x07) {
                    return { type: 'RAR', offset: i };
                }
            }
            
            return null;
        }
        
        // 检测 ZIP 是否加密
        function isZipEncrypted(data) {
            if (data.length < 10) return false;
            const flags = data[6] | (data[7] << 8);
            return (flags & 0x1) === 1;
        }
        
        // 密码弹窗
        function askPassword(isRetry = false) {
            return new Promise(resolve => {
                pwdResolve = resolve;
                pwdInput.value = '';
                pwdError.classList.toggle('show', isRetry);
                pwdModal.classList.add('show');
                setTimeout(() => pwdInput.focus(), 100);
            });
        }
        
        function closePwdModal(value) {
            pwdModal.classList.remove('show');
            if (pwdResolve) {
                pwdResolve(value);
                pwdResolve = null;
            }
        }
        
        pwdOk.onclick = () => closePwdModal(pwdInput.value);
        pwdCancel.onclick = () => closePwdModal(null);
        pwdInput.onkeypress = (e) => { if (e.key === 'Enter') pwdOk.click(); };
        
        // 事件
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = ''; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = () => { if (fileInput.files[0]) processFile(fileInput.files[0]); };
        
        // 主处理
        async function processFile(file) {
            hideAll();
            progress.classList.add('show');
            dropZone.classList.add('disabled');
            files = [];
            
            try {
                setProgress(10, '读取文件...');
                const buffer = await file.arrayBuffer();
                const data = new Uint8Array(buffer);
                
                setProgress(20, '检测格式...');
                const detected = detectFormat(data);
                
                if (!detected) {
                    throw new Error('无法识别文件格式\n\n可能的原因：\n1. 不是压缩文件\n2. 使用了不支持的格式 (如 RAR)\n\n支持的格式：ZIP、7z');
                }
                
                console.log('检测到格式:', detected);
                showFormat(detected.type, detected.offset);
                currentFormat = detected.type;
                
                if (detected.type === 'RAR') {
                    throw new Error('检测到 RAR 格式\n\nRAR 格式受专利限制，浏览器无法解压。\n\n解决方法：\n在电脑上用 WinRAR 或 7-Zip 解压后，重新压缩为 ZIP 格式');
                }
                
                currentZipData = data.slice(detected.offset);
                
                if (detected.type === 'ZIP') {
                    const encrypted = isZipEncrypted(currentZipData);
                    console.log('ZIP 是否加密:', encrypted);
                    
                    let password = null;
                    if (encrypted) {
                        password = await askPassword(false);
                        if (!password) throw new Error('CANCEL');
                    }
                    
                    await extractZip(currentZipData, password);
                    
                } else if (detected.type === '7Z') {
                    await extract7z(currentZipData, null);
                }
                
            } catch (err) {
                if (err.message !== 'CANCEL') {
                    showError(err.message);
                }
            } finally {
                dropZone.classList.remove('disabled');
                if (!pwdModal.classList.contains('show')) {
                    progress.classList.remove('show');
                }
            }
        }
        
        // ZIP 解压
        async function extractZip(zipData, password) {
            setProgress(40, '解压 ZIP...');
            
            // 尝试 fflate
            let result = await extractWithFflate(zipData, password);
            
            if (result.needPassword && !password) {
                const newPwd = await askPassword(false);
                if (!newPwd) throw new Error('CANCEL');
                return await extractZip(zipData, newPwd);
            }
            
            if (!result.success) {
                // 尝试 JSZip
                result = await extractWithJSZip(zipData, password);
                
                if (result.needPassword && !password) {
                    const newPwd = await askPassword(false);
                    if (!newPwd) throw new Error('CANCEL');
                    return await extractZip(zipData, newPwd);
                }
            }
            
            if (result.success) {
                files = result.files;
                showResult();
            } else if (password) {
                // 密码错误
                const newPwd = await askPassword(true);
                if (!newPwd) throw new Error('CANCEL');
                return await extractZip(zipData, newPwd);
            } else {
                throw new Error(result.error || '解压失败');
            }
        }
        
        // 7z 解压 (有限支持)
        async function extract7z(data, password) {
            setProgress(40, '解压 7z...');
            
            // 尝试加载 7z-wasm
            try {
                if (typeof SevenZipWasm === 'undefined') {
                    // 动态加载
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdn.jsdelivr.net/npm/7z-wasm@1.1.0/7zz.js';
                        script.onload = resolve;
                        script.onerror = () => reject(new Error('无法加载 7z 解压模块'));
                        document.head.appendChild(script);
                    });
                    await new Promise(r => setTimeout(r, 1000)); // 等待初始化
                }
                
                // fflate 不支持 7z，这里给出提示
                throw new Error('7z 格式支持有限\n\n建议：\n1. 在电脑上解压后转为 ZIP\n2. 或使用 7-Zip 创建 ZIP 自解压文件');
                
            } catch (e) {
                throw e;
            }
        }
        
        function extractWithFflate(zipData, password) {
            return new Promise((resolve) => {
                try {
                    const opts = password ? { password } : {};
                    const unzipped = fflate.unzipSync(zipData, opts);
                    const files = [];
                    
                    for (const [path, data] of Object.entries(unzipped)) {
                        if (path.endsWith('/')) continue;
                        files.push({ name: path.split('/').pop(), path, size: data.length, data });
                    }
                    
                    if (files.length > 0) {
                        resolve({ success: true, files });
                    } else {
                        resolve({ success: false, error: '没有文件' });
                    }
                } catch (e) {
                    const msg = (e.message || '').toLowerCase();
                    const needPassword = msg.includes('password') || msg.includes('decrypt') || msg.includes('encrypted');
                    resolve({ success: false, error: e.message, needPassword });
                }
            });
        }
        
        async function extractWithJSZip(zipData, password) {
            try {
                const opts = password ? { password } : {};
                const zip = await JSZip.loadAsync(zipData, opts);
                const files = [];
                
                for (const [name, entry] of Object.entries(zip.files)) {
                    if (entry.dir) continue;
                    try {
                        const data = await entry.async('uint8array');
                        files.push({ name: name.split('/').pop(), path: name, size: data.length, data });
                    } catch (e) {
                        const msg = (e.message || '').toLowerCase();
                        if (msg.includes('password') || msg.includes('encrypt')) {
                            return { success: false, needPassword: true };
                        }
                        throw e;
                    }
                }
                
                if (files.length > 0) {
                    return { success: true, files };
                }
                return { success: false, error: '没有文件' };
            } catch (e) {
                const msg = (e.message || '').toLowerCase();
                return { success: false, error: e.message, needPassword: msg.includes('password') || msg.includes('encrypt') };
            }
        }
        
        function showResult() {
            const total = files.reduce((s, f) => s + f.size, 0);
            resultInfo.textContent = `${files.length} 个文件，共 ${formatSize(total)}`;
            
            fileList.innerHTML = files.map((f, i) => `
                <div class="file-item" data-idx="${i}">
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                    </div>
                    <span class="arrow">›</span>
                </div>
            `).join('');
            
            fileList.querySelectorAll('.file-item').forEach(item => {
                item.onclick = () => downloadFile(files[+item.dataset.idx]);
            });
            
            progress.classList.remove('show');
            result.classList.add('show');
        }
        
        function downloadFile(f) {
            const blob = new Blob([f.data]);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = f.name;
            a.click();
            URL.revokeObjectURL(a.href);
        }
        
        downloadAll.onclick = async () => {
            downloadAll.disabled = true;
            downloadAll.textContent = '⏳ 打包中...';
            try {
                const zip = new JSZip();
                files.forEach(f => zip.file(f.path, f.data));
                const blob = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'extracted.zip';
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert('打包失败');
            }
            downloadAll.disabled = false;
            downloadAll.textContent = '📥 打包下载全部';
        };
    })();
    </script>
</body>
</html>
